{{define "head"}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { --fg:#1c1e21; --muted:#6b7280; --line:#e5e7eb; --bg:#f7f7f8; --card:#fff; --accent:#2563eb; --warn-bg:#fef3c7; --warn-fg:#92400e; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:14px/1.6 -apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
  .warn { background:var(--warn-bg); color:var(--warn-fg); padding:6px 16px; font-size:13px;
          position:sticky; top:0; z-index:9; }
  nav { display:flex; gap:18px; align-items:baseline; padding:10px 16px; background:var(--card);
        border-bottom:1px solid var(--line); }
  nav a { color:var(--fg); text-decoration:none; font-weight:600; }
  nav a:hover { color:var(--accent); }
  nav .ver { margin-left:auto; color:var(--muted); font-size:12px; }
  main { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
  h1 { font-size:20px; margin: 8px 0 16px; }
  h2 { font-size:15px; margin: 24px 0 8px; color:var(--muted); font-weight:600; }
  .cards { display:flex; flex-wrap:wrap; gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:8px;
          padding:12px 16px; min-width:200px; flex:1; }
  .card .label { color:var(--muted); font-size:12px; }
  .card .num { font-size:22px; font-weight:700; font-variant-numeric: tabular-nums; }
  .card .sub { color:var(--muted); font-size:12px; }
  table { width:100%; border-collapse:collapse; background:var(--card);
          border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  th, td { text-align:left; padding:7px 12px; border-bottom:1px solid var(--line);
           font-variant-numeric: tabular-nums; }
  th { background:#fafafa; color:var(--muted); font-size:12px; font-weight:600; }
  tr:last-child td { border-bottom:none; }
  td.r, th.r { text-align:right; }
  .empty { color:var(--muted); padding:16px; }
  /* 大盘条形图：纯 CSS flex 条（无图表库、无 CDN） */
  .chart { display:flex; align-items:flex-end; gap:3px; height:160px; background:var(--card);
           border:1px solid var(--line); border-radius:8px; padding:12px; }
  .chart .bar { flex:1; background:var(--accent); border-radius:2px 2px 0 0; min-height:1px; opacity:.85; }
  .chart .bar:hover { opacity:1; }
  .chart .bar.zero { background:var(--line); }
  button { background:var(--accent); color:#fff; border:none; border-radius:6px;
           padding:7px 14px; font-size:14px; cursor:pointer; }
  button:hover { filter:brightness(1.1); }
  button.danger { background:#dc2626; }
  input, textarea { font:inherit; border:1px solid var(--line); border-radius:6px;
                    padding:7px 10px; width:100%; background:var(--card); }
  textarea { resize:vertical; }
  form.row { display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; }
  form.row label { display:block; font-size:12px; color:var(--muted); }
  form.row .f { flex:1; min-width:160px; }
  code { background:#eef1f4; border-radius:4px; padding:1px 5px; }
  /* 聊天页 */
  #log { background:var(--card); border:1px solid var(--line); border-radius:8px;
         padding:12px 16px; min-height:300px; }
  #log .msg { white-space:pre-wrap; word-break:break-word; margin:0 0 10px; }
  #log .me { color:var(--accent); font-weight:600; }
  #log details { margin:6px 0; color:var(--muted); font-size:13px; }
  #log details pre { white-space:pre-wrap; word-break:break-all; background:#fafafa;
                     padding:6px 8px; border-radius:6px; margin:4px 0 0; }
  #log .fin { color:var(--muted); font-size:12px; border-top:1px dashed var(--line); padding-top:6px; }
  #log .err { color:#dc2626; }
  .pairout { margin-top:10px; font-size:15px; }
</style>
{{end}}

{{define "nav"}}
<div class="warn">⚠ WebUI v0 无鉴权——安全边界是「serve 默认仅绑回环（127.0.0.1）」，勿绑 0.0.0.0 暴露公网。</div>
<nav>
  <a href="/ui">用量大盘</a>
  <a href="/ui/chat">聊天</a>
  <a href="/ui/team">团队</a>
  <a href="/ui/models">模型</a>
  <span class="ver">tokencode {{.Version}}</span>
</nav>
{{end}}
